<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MŪSA — Sin conexión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #FAF8F5;
      color: #2C2C2C;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #C5932A;
      margin-bottom: 2rem;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      opacity: 0.5;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #2C2C2C;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #666;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #C5932A;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    .retry-btn:hover { background: #A67A22; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">MŪSA</div>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-3.03M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>Sin conexión</h1>
    <p>Parece que no tienes conexión a Internet. Reconéctate para seguir explorando 4,000 años de arte.</p>
    <button class="retry-btn" onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
